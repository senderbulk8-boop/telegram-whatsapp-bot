name: Run Telegram to WhatsApp Bot

on:
  schedule:
    - cron: '*/5 * * * *' # हर 5 मिनट में चलेगा
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run python bot.py
        run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          WAHA_CHAT_ID: ${{ secrets.WAHA_CHAT_ID }}
          GREENAPI_ID: ${{ secrets.GREENAPI_ID }}
          GREENAPI_TOKEN: ${{ secrets.GREENAPI_TOKEN }}
          
      - name: Save Last Update ID
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_update_id.txt
          git commit -m "Update message ID" || echo "No new messages"
          git push
