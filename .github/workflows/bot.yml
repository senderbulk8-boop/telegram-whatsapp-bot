name: Run Telegram to WhatsApp Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run python bot.py
        run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          
          # पहला अकाउंट
          GREENAPI_HOST_1: ${{ secrets.GREENAPI_HOST_1 }}
          GREENAPI_ID_1: ${{ secrets.GREENAPI_ID_1 }}
          GREENAPI_TOKEN_1: ${{ secrets.GREENAPI_TOKEN_1 }}
          CHATS_1: ${{ secrets.CHATS_1 }}
          
          # दूसरा अकाउंट
          GREENAPI_HOST_2: ${{ secrets.GREENAPI_HOST_2 }}
          GREENAPI_ID_2: ${{ secrets.GREENAPI_ID_2 }}
          GREENAPI_TOKEN_2: ${{ secrets.GREENAPI_TOKEN_2 }}
          CHATS_2: ${{ secrets.CHATS_2 }}
          
      - name: Save Last Update ID
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_update_id.txt
          git commit -m "Update message ID" || echo "No new messages"
          git push
