name: Run Telegram to WhatsApp Bot

on:
  schedule:
    - cron: '*/5 * * * *' # Har 5 minute mein chalega
  workflow_dispatch: # Manual button ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run python bot.py
        run: python bot.py
        env:
          # Telegram Setup
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          
          # Meta WhatsApp Official API Setup (Jo humne pehle set kiye)
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
          
          # Agar aap purane GreenAPI accounts bhi rakhna chahte hain
          GREENAPI_HOST_1: ${{ secrets.GREENAPI_HOST_1 }}
          GREENAPI_ID_1: ${{ secrets.GREENAPI_ID_1 }}
          GREENAPI_TOKEN_1: ${{ secrets.GREENAPI_TOKEN_1 }}
          CHATS_1: ${{ secrets.CHATS_1 }}
          
      - name: Save Last Update ID
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_update_id.txt
          git commit -m "Update message ID" || echo "No new messages"
          git push
